name: Build & Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: pip install pyinstaller -e .

      - name: Build CLI binary
        shell: bash
        run: pyinstaller most-sb-cli.spec

      - name: Build TUI binary
        shell: bash
        run: pyinstaller most-sb-tui.spec

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist/packages
          cd dist
          case "${{ matrix.os }}" in
            windows-*) 7z a packages/most-sb-${{ matrix.os }}.zip most-sb.exe most-sb-tui.exe ;;
            *)         tar czf packages/most-sb-${{ matrix.os }}.tar.gz most-sb most-sb-tui ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/packages/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
