name: Build & Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          pip install pyinstaller -r requirements.txt

      - name: Build CLI binary
        shell: bash
        run: pyinstaller most-sb-cli.spec

      - name: Build TUI binary
        shell: bash
        run: pyinstaller most-sb-tui.spec

      - name: Package binaries
        shell: bash
        run: |
          cd dist
          case "${{ matrix.os }}" in
            windows-*)  7z a most-sb-${{ matrix.os }}.zip most-sb.exe most-sb-tui.exe ;;
            *)          tar czf most-sb-${{ matrix.os }}.tar.gz most-sb most-sb-tui ;;
          esac

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/most-sb-*.tar.gz dist/most-sb-*.zip
